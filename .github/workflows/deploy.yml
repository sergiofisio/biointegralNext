name: Deploy para Hostinger via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build e Deploy
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 35

    env:
      FTP_HOST_RAW: ${{ secrets.FTP_HOST }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      # Em Hostinger, a pasta do site costuma ser domains/<dominio>/public_html
      # (a home FTP às vezes tem um atalho public_html → esse caminho).
      FTP_SERVER_DIR: ${{ vars.FTP_SERVER_DIR || './domains/biointegralsaude.com.br/public_html/' }}
      SFTP_REMOTE_PATH: ${{ vars.SFTP_REMOTE_PATH || 'domains/biointegralsaude.com.br/public_html' }}

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"

      - name: Instalar dependências
        run: yarn install --frozen-lockfile

      - name: Normalizar e validar credenciais FTP
        run: |
          if [ -z "$FTP_HOST_RAW" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "::error::Secrets FTP ausentes. Em Settings → Environments → production → Environment secrets, configure:"
            echo "  FTP_HOST, FTP_USERNAME, FTP_PASSWORD"
            echo "Não use Environment variables para senha/host — o workflow lê secrets.*"
            exit 1
          fi

          # Aceita "ftp://IP", "IP" ou host com path; a action exige só hostname/IP.
          HOST="$FTP_HOST_RAW"
          HOST="${HOST#ftp://}"
          HOST="${HOST#ftps://}"
          HOST="${HOST#sftp://}"
          HOST="${HOST%%/*}"
          HOST="${HOST%%:*}"

          if [ -z "$HOST" ]; then
            echo "::error::FTP_HOST inválido após normalização."
            exit 1
          fi

          echo "FTP_HOST normalizado: $HOST"
          echo "FTP_SERVER=$HOST" >> "$GITHUB_ENV"

      - name: Verificar variáveis EmailJS
        env:
          NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${{ vars.EMAILJS_SERVICE_ID || vars.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: ${{ vars.EMAILJS_TEMPLATE_ID || vars.NEXT_PUBLIC_EMAILJS_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_CONTATO_TEMPLATE_ID: ${{ vars.EMAILJS_CONTATO_TEMPLATE_ID || vars.NEXT_PUBLIC_EMAILJS_CONTATO_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_SATISFACTION_TEMPLATE_ID: ${{ vars.EMAILJS_SATISFACTION_TEMPLATE_ID || vars.NEXT_PUBLIC_EMAILJS_SATISFACTION_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${{ vars.EMAILJS_PUBLIC_KEY || vars.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}
        run: |
          missing=0
          for var in NEXT_PUBLIC_EMAILJS_SERVICE_ID NEXT_PUBLIC_EMAILJS_PUBLIC_KEY NEXT_PUBLIC_EMAILJS_SATISFACTION_TEMPLATE_ID; do
            if [ -z "${!var}" ]; then
              echo "::error::$var não configurada no environment production (Variables)"
              missing=1
            fi
          done
          # Contato: CONTATO_TEMPLATE_ID ou fallback TEMPLATE_ID
          if [ -z "$NEXT_PUBLIC_EMAILJS_CONTATO_TEMPLATE_ID" ] && [ -z "$NEXT_PUBLIC_EMAILJS_TEMPLATE_ID" ]; then
            echo "::error::Defina NEXT_PUBLIC_EMAILJS_CONTATO_TEMPLATE_ID (ou NEXT_PUBLIC_EMAILJS_TEMPLATE_ID) nas Variables"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo "Configure em Settings → Environments → production → Environment variables:"
            echo "  NEXT_PUBLIC_EMAILJS_SERVICE_ID"
            echo "  NEXT_PUBLIC_EMAILJS_PUBLIC_KEY"
            echo "  NEXT_PUBLIC_EMAILJS_CONTATO_TEMPLATE_ID  (template do formulário /contato)"
            echo "  NEXT_PUBLIC_EMAILJS_SATISFACTION_TEMPLATE_ID  (template de /satisfacao)"
            exit 1
          fi

      - name: Build estático (Next.js)
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_BUILD_ID: ${{ github.sha }}
          NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${{ vars.EMAILJS_SERVICE_ID || vars.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: ${{ vars.EMAILJS_TEMPLATE_ID || vars.NEXT_PUBLIC_EMAILJS_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_CONTATO_TEMPLATE_ID: ${{ vars.EMAILJS_CONTATO_TEMPLATE_ID || vars.NEXT_PUBLIC_EMAILJS_CONTATO_TEMPLATE_ID || vars.EMAILJS_TEMPLATE_ID || vars.NEXT_PUBLIC_EMAILJS_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_SATISFACTION_TEMPLATE_ID: ${{ vars.EMAILJS_SATISFACTION_TEMPLATE_ID || vars.NEXT_PUBLIC_EMAILJS_SATISFACTION_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${{ vars.EMAILJS_PUBLIC_KEY || vars.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}
        run: yarn build:static

      - name: Testar conectividade com Hostinger
        continue-on-error: true
        run: |
          echo "Servidor configurado: $FTP_SERVER"
          for PORT in 21 65002; do
            echo -n "Porta $PORT: "
            if timeout 20 bash -c "echo > /dev/tcp/$FTP_SERVER/$PORT" 2>/dev/null; then
              echo "acessível"
            else
              echo "sem resposta (timeout ou bloqueada)"
            fi
          done

      - name: Aguardar servidor FTP
        run: sleep 15

      # FTP simples costuma ser mais estável que FTPS a partir dos runners do GitHub.
      - name: Deploy FTP — tentativa 1 (FTP simples, porta 21)
        id: ftp_plain
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./out/
          server-dir: ${{ env.FTP_SERVER_DIR }}
          log-level: verbose
          timeout: 180000

      - name: Aguardar antes da tentativa 2
        if: steps.ftp_plain.outcome == 'failure'
        run: sleep 30

      - name: Deploy FTP — tentativa 2 (FTPS explícito)
        id: ftp_ftps
        if: steps.ftp_plain.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          protocol: ftps
          security: loose
          port: 21
          local-dir: ./out/
          server-dir: ${{ env.FTP_SERVER_DIR }}
          log-level: verbose
          timeout: 180000

      - name: Aguardar antes da tentativa 3
        if: steps.ftp_plain.outcome == 'failure' && steps.ftp_ftps.outcome == 'failure'
        run: sleep 30

      - name: Deploy FTP — tentativa 3 (FTPS legacy)
        id: ftp_ftps_legacy
        if: steps.ftp_plain.outcome == 'failure' && steps.ftp_ftps.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          protocol: ftps-legacy
          security: loose
          port: 21
          local-dir: ./out/
          server-dir: ${{ env.FTP_SERVER_DIR }}
          log-level: verbose
          timeout: 180000

      - name: Aguardar antes do SFTP
        if: steps.ftp_plain.outcome == 'failure' && steps.ftp_ftps.outcome == 'failure' && steps.ftp_ftps_legacy.outcome == 'failure'
        run: sleep 30

      # SFTP (porta 65002) — requer SSH/SFTP ativo no hPanel → Advanced → SSH Access.
      - name: Deploy SFTP — tentativa 4 (porta 65002)
        id: sftp_deploy
        if: steps.ftp_plain.outcome == 'failure' && steps.ftp_ftps.outcome == 'failure' && steps.ftp_ftps_legacy.outcome == 'failure'
        continue-on-error: true
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          username: ${{ env.FTP_USERNAME }}
          server: ${{ env.FTP_SERVER }}
          port: 65002
          password: ${{ env.FTP_PASSWORD }}
          local_path: "./out/*"
          remote_path: ${{ env.SFTP_REMOTE_PATH }}
          sftp_only: true
          sftpArgs: "-o ConnectTimeout=60 -o ServerAliveInterval=30 -o StrictHostKeyChecking=no"

      - name: Resumo e falha se deploy não concluiu
        if: always()
        run: |
          if [ "${{ steps.ftp_plain.outcome }}" = "success" ]; then
            echo "Deploy concluído via FTP simples (porta 21)."
            exit 0
          fi
          if [ "${{ steps.ftp_ftps.outcome }}" = "success" ]; then
            echo "Deploy concluído via FTPS (porta 21)."
            exit 0
          fi
          if [ "${{ steps.ftp_ftps_legacy.outcome }}" = "success" ]; then
            echo "Deploy concluído via FTPS legacy (porta 21)."
            exit 0
          fi
          if [ "${{ steps.sftp_deploy.outcome }}" = "success" ]; then
            echo "Deploy concluído via SFTP (porta 65002)."
            exit 0
          fi

          echo "::error::Deploy falhou após 4 tentativas (FTP, FTPS, FTPS legacy e SFTP)."
          echo ""
          echo "Checklist:"
          echo "  1. FTP_HOST = IP do hPanel (FTP Accounts), sem ftp:// na frente"
          echo "  2. Usuário/senha corretos (mesma conta usada no FileZilla)"
          echo "  3. hPanel → Advanced → SSH Access → ativar SFTP (porta 65002)"
          echo "  4. Se SFTP usar outro caminho, defina a variable SFTP_REMOTE_PATH no environment production"
          echo "     (ex.: domains/biointegralsaude.com.br/public_html)"
          exit 1
