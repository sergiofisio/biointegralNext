name: Deploy para Hostinger via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build e Deploy
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    env:
      FTP_SERVER: ${{ secrets.FTP_HOST }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"

      - name: Instalar dependências
        run: yarn install --frozen-lockfile

      - name: Verificar variáveis EmailJS
        env:
          NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${{ vars.EMAILJS_SERVICE_ID || vars.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: ${{ vars.EMAILJS_TEMPLATE_ID || vars.NEXT_PUBLIC_EMAILJS_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_SATISFACTION_TEMPLATE_ID: ${{ vars.EMAILJS_SATISFACTION_TEMPLATE_ID || vars.NEXT_PUBLIC_EMAILJS_SATISFACTION_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${{ vars.EMAILJS_PUBLIC_KEY || vars.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}
        run: |
          missing=0
          for var in NEXT_PUBLIC_EMAILJS_SERVICE_ID NEXT_PUBLIC_EMAILJS_TEMPLATE_ID NEXT_PUBLIC_EMAILJS_SATISFACTION_TEMPLATE_ID NEXT_PUBLIC_EMAILJS_PUBLIC_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::$var não configurada no environment production"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Configure as variáveis do EmailJS em Settings → Environments → production (Variables)."
            echo "Nomes aceitos: EMAILJS_* ou NEXT_PUBLIC_EMAILJS_* (incluindo EMAILJS_SATISFACTION_TEMPLATE_ID ou NEXT_PUBLIC_EMAILJS_SATISFACTION_TEMPLATE_ID)."
            exit 1
          fi

      - name: Build estático (Next.js)
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${{ vars.EMAILJS_SERVICE_ID || vars.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: ${{ vars.EMAILJS_TEMPLATE_ID || vars.NEXT_PUBLIC_EMAILJS_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_SATISFACTION_TEMPLATE_ID: ${{ vars.EMAILJS_SATISFACTION_TEMPLATE_ID || vars.NEXT_PUBLIC_EMAILJS_SATISFACTION_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${{ vars.EMAILJS_PUBLIC_KEY || vars.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}
        run: yarn build:static

      # Hostinger pode demorar na 1ª conexão FTPS a partir dos runners do GitHub.
      - name: Aguardar servidor FTP
        run: sleep 15

      - name: Deploy via FTP para Hostinger (tentativa 1)
        id: ftp_deploy
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./out/
          server-dir: ./domains/biointegralsaude.com.br/public_html/
          log-level: verbose
          timeout: 120000

      - name: Aguardar antes de nova tentativa
        if: steps.ftp_deploy.outcome == 'failure'
        run: sleep 30

      - name: Deploy via FTP para Hostinger (tentativa 2)
        id: ftp_deploy_retry
        if: steps.ftp_deploy.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./out/
          server-dir: ./domains/biointegralsaude.com.br/public_html/
          log-level: verbose
          timeout: 180000

      - name: Falhar se deploy FTP não concluiu
        if: steps.ftp_deploy.outcome != 'success' && steps.ftp_deploy_retry.outcome != 'success'
        run: |
          echo "::error::Deploy FTP falhou após 2 tentativas (timeout ou conexão recusada)."
          echo "Confira se FTP_HOST usa o IP do servidor (ex.: 185.245.180.163) e se a porta 21 FTPS está liberada."
          exit 1
