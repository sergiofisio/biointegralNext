name: Deploy para Hostinger via SFTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build e Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"

      - name: Instalar dependências
        run: yarn install --frozen-lockfile

      - name: Build estático (Next.js)
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_CONTACT_API_URL: ${{ vars.CONTACT_API_URL }}
        run: yarn build:static

      - name: Deploy via SFTP para Hostinger
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          port: 65002
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: "./out/*"
          remote_path: "domains/biointegralsaude.com.br/public_html/"
          sftp_only: true
          delete_remote_files: true
          sftpArgs: "-o ConnectTimeout=30"
